<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPUSniff</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="header-icon">🐕‍🦺</span>
        <h1 class="header-title">GPU<span class="accent">Sniff</span></h1>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
          <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.421 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 00-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.692-1.115l-.292.16c-.764.415-1.6-.421-1.184-1.185l.159-.291A1.873 1.873 0 001.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 003.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.116l.094-.318z"/>
        </svg>
      </button>
    </header>

    <!-- Search -->
    <div class="search-container">
      <div class="search-input-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85-.017.016zm-5.44.856a5.5 5.5 0 110-11 5.5 5.5 0 010 11z"/>
        </svg>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search GPUs... (e.g. RTX 5070, RX 9070)" 
          autocomplete="off"
        >
        <span id="search-clear" class="search-clear hidden">✕</span>
      </div>
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="deals">🔥 Deals</button>
      <button class="tab" data-tab="alerts">🔔 Alerts</button>
      <button class="tab" data-tab="compare">📊 Compare</button>
    </nav>

    <!-- Tab Content -->
    <main class="content">
      <!-- Deals Tab -->
      <div id="tab-deals" class="tab-content active">
        <div class="section-header">
          <h2>Trending Deals</h2>
          <span class="badge badge-live">LIVE</span>
        </div>
        <div id="deals-list" class="deals-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Alerts Tab -->
      <div id="tab-alerts" class="tab-content">
        <div class="section-header">
          <h2>Price Alerts</h2>
          <span id="alert-count" class="badge">0</span>
        </div>
        <div id="alerts-list" class="alerts-list">
          <div class="empty-state">
            <span class="empty-icon">🔕</span>
            <p>No price alerts set.</p>
            <p class="empty-hint">Search for a GPU and click "Set Alert" to get notified when prices drop.</p>
          </div>
        </div>
      </div>

      <!-- Compare Tab -->
      <div id="tab-compare" class="tab-content">
        <div class="section-header">
          <h2>Price Comparison</h2>
        </div>
        <div id="compare-content" class="compare-content">
          <div class="empty-state">
            <span class="empty-icon">📊</span>
            <p>Search for a GPU to compare prices across retailers.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>GPUSniff v1.0</span>
      <a href="https://gpusniff.com" target="_blank" rel="noopener">gpusniff.com</a>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
